<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Vault Diver</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://vaultdiver.com/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f0c; --bg-deep:#060907; --panel:#080c09;
    --green:#6fe08a; --green-lt:#a8f0b8; --lime:#b8e04a;
    --ink:#e8f2ea; --muted:#8fa596; --dim:#63776a;
    --rot:#e07a5f; --gold:#c9b96a; --border:#1c2a20;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'IBM Plex Mono',monospace;
    background:radial-gradient(120% 90% at 50% 0%, #10180f 0%, var(--bg) 45%, var(--bg-deep) 100%);
    color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px 20px;position:relative;overflow:hidden;
  }
  /* CRT scanlines + vignette */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:2;
    background:repeating-linear-gradient(180deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.22) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;opacity:.5;
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:2;
    box-shadow:inset 0 0 220px rgba(0,0,0,.85);
  }
  .wrap{position:relative;z-index:1;max-width:560px;width:100%;text-align:center}

  .tag{
    font-family:'Silkscreen',monospace;font-size:11px;letter-spacing:3px;
    color:var(--dim);text-transform:uppercase;margin-bottom:26px;
  }
  .tag b{color:var(--green)}

  .code{
    font-family:'VT323',monospace;
    font-size:clamp(128px,32vw,220px);line-height:.82;
    color:var(--green);
    text-shadow:0 0 18px rgba(111,224,138,.45), 3px 3px 0 rgba(224,122,95,.35);
    letter-spacing:6px;position:relative;
    animation:flick 5.5s infinite steps(1);
  }
  .code .rotchar{color:var(--rot);display:inline-block;transform:rotate(6deg) translateY(6px)}
  @keyframes flick{0%,97%,100%{opacity:1}97.5%{opacity:.72}98.5%{opacity:.9}}

  h1{
    font-family:'Silkscreen',monospace;font-weight:700;
    font-size:clamp(17px,4.5vw,24px);letter-spacing:1px;
    color:var(--green-lt);margin:8px 0 18px;
  }
  h1 .glitch{color:var(--rot)}

  p.desc{
    font-size:15px;line-height:1.65;color:var(--muted);
    max-width:420px;margin:0 auto 34px;
  }
  p.desc .hl{color:var(--lime)}

  .btn{
    display:inline-flex;align-items:center;gap:10px;
    font-family:'Silkscreen',monospace;font-size:12px;letter-spacing:1px;
    text-decoration:none;text-transform:uppercase;
    color:var(--bg-deep);background:var(--green);
    padding:15px 26px;border:2px solid var(--green-lt);
    box-shadow:4px 4px 0 rgba(111,224,138,.25), 0 0 24px rgba(111,224,138,.2);
    transition:transform .08s ease, box-shadow .08s ease, background .15s ease;
  }
  .btn:hover{background:var(--green-lt);transform:translate(-2px,-2px);
    box-shadow:6px 6px 0 rgba(111,224,138,.3), 0 0 30px rgba(111,224,138,.3)}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(111,224,138,.25)}

  .prompt{
    margin-top:40px;font-size:13px;color:var(--dim);
  }
  .prompt .path{color:var(--gold)}
  .cursor{display:inline-block;width:9px;height:16px;background:var(--green);
    margin-left:3px;vertical-align:-2px;animation:blink 1.05s steps(1) infinite}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}

  .footer{
    position:fixed;bottom:16px;left:0;right:0;z-index:1;text-align:center;
    font-family:'Silkscreen',monospace;font-size:9px;letter-spacing:2px;
    color:#2f4034;text-transform:uppercase;
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="tag">// <b>VAULT&nbsp;DIVER</b> — signal lost</div>

    <div class="code" aria-hidden="true">4<span class="rotchar">0</span>4</div>

    <h1>THIS CARD HAS <span class="glitch">ROTTED</span></h1>

    <p class="desc">
      The page you drew decayed into the void — or it never existed in this
      run. Every deck rots eventually; <span class="hl">this one just went first.</span>
    </p>

    <a class="btn" href="/">&#8617;&nbsp; Return to the vault</a>

    <div class="prompt">
      <span class="path">~/vaultdiver</span> $ reshuffle<span class="cursor"></span>
    </div>
  </main>

  <div class="footer">A roguelite deckbuilder where your deck rots</div>
</body>
</html>
